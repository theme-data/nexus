<div class="faq-container" id="faqContainer">
    <!-- O conteúdo do FAQ será inserido aqui via jQuery -->
</div>

    const faqItems = [
       {

        resposta: "<p>Uma licença do jogo original para inserir em seu console.</p><p>Os dados de acesso serão enviados em seu WhatsApp cadastrado em nossa loja.</p><p>Basta adicionar os dados em seu console para liberar o download do jogo completo no servidor oficial do seu console.</p>"
    },
    {
        pergunta: "É seguro comprar nesta loja?",
        resposta: "<p>Sim! A Mex Games existe há mais de 3 anos com CNPJ ativo.</p><p>Somos um ponto de venda OFICIAL de grandes empresas de produtos e serviços digitais.</p><p>Com mais de 50 mil pedidos enviados e uma base de 5 mil clientes cadastrados em nosso WhatsApp.</p><p>Pode ter a certeza que está comprando com segurança de uma loja que além de vender jogos proporciona o melhor suporte e experiência do cliente, sendo uma das únicas com escritório físico.</p><p>Além disso temos diversos depoimentos e feedback positivos em nosso Instagram (<strong>@mexgamess</strong>).</p>"
    },
    {
        pergunta: "Qual o prazo de entrega?",
        resposta: "<p>O prazo normal para entrega é de até 10 minutos após o seu pagamento aprovado por nossa loja, porém em dias que nossa loja recebe um grande número de pedido esse prazo pode-se estender para alguns minutos a mais.</p><p>Garantimos a entrega do pedido no mesmo dia em que o pagamento é aprovado.</p><p><strong>ATENÇÃO:</strong> Esse prazo é somente válido em dias úteis de segunda a sexta feira das 11:30 às 22 horas. Sábado de 10 às 18 horas.</p>"
    },
    {
        pergunta: "Qual a garantia desse jogo ?",
        resposta: "<p>Oferecemos garantia vitalícia para todos jogos comprados em nosso site, isso quer dizer que o jogo é seu pra sempre, você pode usar ele ilimitado.</p><p>Oferecemos suporte permanente para todos jogos comprados em nosso site.</p><p>Entretanto existem algumas regras para podermos oferecer essa Garantia e Suporte:</p><ul><li>Respeitar o guia de instalação</li><li>Não alterar os dados da conta, email, senha, telefone ou qualquer outra coisa</li><li>Não acessar a conta em mais de 1 console, emprestar ou compartilhar o jogo</li><li>Não pode usar a licença de uma forma diferente que foi estipulada para você</li></ul><p>Se você seguir essas regras você terá acesso ao jogo pra sempre. Garantindo total tranquilidade para você aproveitar seus jogos sempre que desejar.</p>"
    },
    {
        pergunta: "Ao trocar de console, vender ou em caso de defeito, eu corro o risco de perder meus jogos?",
        resposta: "<p>Em caso de defeitos, todos os jogos comprados em nossa loja têm garantia de reinstalação, basta você salvar os dados de acesso e inserir novamente em seu console e a licença será ativada novamente em seu console novo, ou no mesmo console, caso ele seja formatado.</p><p>Após feito isso, basta fazer o download do jogo e instalar novamente e tudo volta a funcionar como antes.</p><p>Em caso de venda ou troca de console, HD ou SSD, para você não perder o seu jogo, envie um vídeo em nosso WhatsApp <strong>DELETANDO</strong> os dados de acesso ao jogo do console que vai vender para que a licença seja removida dele e salve ela ou anote.</p><p>Quando você comprar um novo console, basta você inserir novamente os dados de acesso ao novo console para que a licença seja ativada nele.</p><p>Desta forma, você vai poder fazer um novo download do jogo em seu console através dos servidores oficiais do console.</p>"
    },
    {
        pergunta: "É possível realizar a troca dos produtos ?",
        resposta: "<p><p>Esse é um produto digital de consumo imediato! Mas como somos uma das lojas com melhor suporte do Brasil oferecemos sim a possibilidade de troca nessas três seguintes condições:</p><p>- Antes do envio do produto, você pode solicitar a troca para qualquer produto do site, caso haja diferença de preço para maior, você pode pagar a diferença no Pix ou Link de Pagamento via cartão. Caso o produto seja de menor valor que você comprou, irá receber um CUPOM de crédito para loja.</p><p>- Depois do envio do produto, dentro de 7 dias você pode solicitar a troca e será aprovada por nossos atendentes pelo WhatsApp, seguindo a mesma lógica de produtos para troca antes do envio, a diferença é que será cobrado uma taxa fixa de troca.</p><p>- Depois de 7 dias do envio do produto, você ainda pode solicitar a troca do produto, porém nossa equipe irá fazer uma análise se a troca será aceita e os termos serão negociados diretamente pelo WhatsApp.</p>"
    },
    {
        pergunta: "Os jogos comprados no site vão ser adicionados em uma só conta ?",
        resposta: "<p>Não! Cada jogo é enviado em uma conta separada, mas não se preocupe com a quantidade de contas no seu console.</p><p>No PlayStation você pode ter até 16 contas ao mesmo tempo, enquanto no Xbox pode ter até 33 contas ativas (incluindo a sua conta pessoal).</p><p>Para sua maior tranquilidade, todos os jogos têm direito a reinstalação.</p><p>Então, caso compre mais jogos do que o número de contas permitidas em seu console, você pode apagar a conta do jogo que não está usando no momento e depois adicioná-la de volta a qualquer momento.</p><p>Garantindo total tranquilidade para você aproveitar seus jogos sempre que desejar.</p>"
    },
    {
        pergunta: "Posso cancelar, devolver ou pedir reembolso dos produtos ?",
        resposta: "<p>Esse é um produto digital de consumo imediato, um bem digital intangível e mutável!</p><p>Você pode solicitar a devolução do pagamento em até 7 dias após a compra caso não tenha visualizado os dados de acesso ou inserido o jogo em seu console.</p><p>Se você inserir ou visualizar os dados de acesso ao jogo em seu console a licença de uso será ativada e o produto já é dado como consumido e não aceitaremos devoluções e reembolso de valores, porque esta licença não será possível enviar para outra pessoa.</p>"
    },
    {
        pergunta: "Preciso de internet para poder jogar?",
        resposta: "<p>Isso depende inicialmente do jogo que você quer jogar, existem jogos que pedem a verificação e exigem que você esteja online para jogar o tempo todo.</p><p>Mas considerando que o jogo não exige conexão para jogar:</p><p><strong>Xbox:</strong> Sim! Quando você entra no jogo ele faz uma autenticação com os servidores oficiais da Xbox Live, verificando a licença do seu jogo, por isso é necessário que o console esteja conectado à internet.</p><p><strong>PlayStation:</strong> Se você comprar a Mídia Primária não precisa estar conectado o tempo todo, mas pelo menos uma vez a cada 3 dias seu console precisa se conectar.</p><p>Em caso de Mídia Secundária, sim, é necessário estar conectado o tempo inteiro para jogar.</p>"
    },
    {
        pergunta: "Posso comprar DLC, Complemento, itens para os jogos ?",
        resposta: "<p>Sim. Você pode comprar DLC, season pass e qualquer outro complemento para os jogos comprados em nossa loja.</p><p>Para isso, basta comprar o complemento diretamente no seu perfil pessoal, assim o conteúdo vai funcionar perfeitamente para você.</p><p>Caso comprou a <strong>Mídia Secundária</strong> de <strong>PlayStation</strong> precisa comprar na conta do jogo, porém não garantimos que todas as contas possam comprar DLC, então caso tenha interesse em comprar DLCs no jogo, compre a Midia Primaria.</p>"
    },
    {
        pergunta: "Existe tempo limite para fazer download do jogo?",
        resposta: "<p>Não, você pode baixar o seu jogo de Xbox ou PlayStation em mídia digital quando quiser, mas quanto mais rápido você baixar, mais rápido vai se divertir!</p>"
    },
    {
        pergunta: "Como é feita a instalação do jogo?",
        resposta: "<p>Assim que você receber o seu jogo você receberá também um vídeo tutorial mostrando exatamente como fazer a instalação e o uso do seu jogo comprado.</p>"
    },
    {
        pergunta: "Irei obter as conquistas e troféus dos jogos nas minha conta pessoal?",
        resposta: "<p>Sim! Se você comprar um produto de Xbox, você sempre vai jogar na sua conta pessoal.</p><p>Todas as conquistas serão resgatadas na sua conta pessoal.</p><p>Se você comprar Mídia Primária de PlayStation você também sempre vai jogar na sua conta pessoal, recebendo todos troféus na sua conta pessoal e podendo platinar os jogos.</p><p>Se você comprar Mídia Secundária de PlayStation, você precisa jogar na conta enviada do jogo, pode sim conseguir os troféus e platinar, mas estarão salvos na conta do jogo.</p>"
    },
    {
        pergunta: "Posso jogar online? ",
        resposta: "<p>Você poderá jogar online tranquilamente, desde que sua Xbox Live Gold (Gamepass core ou Ultimate) ou que sua Assinatura PS PLUS esteja ativa.</p><p>E se ainda não tiver, a gente também vende Game Pass Ultimate e PS Plus com ótimos preços!</p>"
    }
];

    // Função para criar o FAQ
    function criarFAQ() {
        const $container = $('#faqContainer');
        
        faqItems.forEach((item, index) => {
            const faqHTML = `
                <div class="faq-item" data-index="${index}">
                    <div class="faq-question">${item.pergunta}</div>
                    <div class="faq-answer">${item.resposta}</div>
                </div>
            `;
            $container.append(faqHTML);
        });

        // Adicionar evento de clique
        $('.faq-question').on('click', function() {
            const $item = $(this).parent();
            $item.toggleClass('active');
            $('.faq-item').not($item).removeClass('active');
        });
    }

    // Inicializar o FAQ quando o documento estiver pronto
    $(document).ready(function() {
        criarFAQ();
    });

    // Função para adicionar nova pergunta
    function adicionarPergunta(pergunta, resposta) {
        faqItems.push({
            pergunta: pergunta,
            resposta: resposta
        });
        
        // Recriar o FAQ com a nova pergunta
        $('#faqContainer').empty();
        criarFAQ();
    }

    $('.pagina-produto .secao-principal').append($('#faqContainer'));

</script>

<style>
    .faq-container {
        max-width: 100%;
        margin: 0 auto;
        padding: 0px;
        position: relative;
        display: flex;
        width: 100%;
        flex-direction: column;
    }
    .faq-item {
        margin-bottom: 15px;
        border: 1px solid #ddd;
        border-radius: 5px;
    }
    .faq-question {
        padding: 15px;
        background-color: #f5f5f5;
        cursor: pointer;
        font-weight: bold;
        position: relative;
        display: flex;
        align-items: center;
        font-size: 16px;
        color: #222;
    }
    .faq-question:after {
        content: '+';
        position: absolute;
        right: 15px;
        transition: transform 0.3s ease;
        font-size: 16px;
    }
    .faq-item.active .faq-question:after {
        transform: rotate(45deg);
    }
    .faq-answer {
        padding: 0;
        max-height: 0;
        overflow: hidden;
        transition: all 0.3s ease;
    }
    .faq-item.active .faq-answer {
        padding: 15px;
        max-height: 1000px;
        font-size: 14px;
        color: #444;
    }
    .faq-answer p {
        margin: 0;
    }
</style>
